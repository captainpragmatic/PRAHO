# ===============================================================================
# TEST CONFIGURATION
# ===============================================================================

[tool.pytest.ini_options]
# ===============================================================================
# ROOT-LEVEL PYTEST CONFIGURATION - Integration & E2E Tests Only
# ===============================================================================
# Service-specific tests are in services/platform/pytest.ini and services/portal/pytest.ini
# This config is for cross-service black-box testing only

# NO Django settings at root - tests should be framework-agnostic
# DJANGO_SETTINGS_MODULE should NOT be set here

addopts = [
    "--verbose",
    "--tb=short",
    "--strict-markers",
    "--disable-warnings",
    "-p no:django",  # Disable Django plugin for integration tests
]

# Only integration and E2E tests at root
testpaths = [
    "tests/integration_tests",
    "tests/e2e",
]

markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests (API-level cross-service)",
    "e2e: marks tests as end-to-end tests (browser-level)",
    "e2e_platform: Platform E2E tests (staff backend :8700)",
    "e2e_portal: Portal E2E tests (customer frontend :8701)",
    "e2e_orm: ORM-based E2E tests (no browser)",
    "security: marks security-related tests",
    "smoke: marks smoke tests for quick validation",
    "requires_platform: marks tests requiring platform service running",
    "requires_portal: marks tests requiring portal service running",
]

filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

# ===============================================================================
# COVERAGE CONFIGURATION  
# ===============================================================================

[tool.coverage.run]
# compliance requires high test coverage
source = ["apps", "config", "ui"]
omit = [
    "*/migrations/*",
    "*/tests/*", 
    "*/venv/*",
    "*/env/*",
    "*/.venv/*",
    "manage.py",
    "*/settings/*",
    "*/wsgi.py",
    "*/asgi.py",
]
branch = true

[tool.coverage.report]
# Enforce 90% diff coverage for business compliance
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true
skip_covered = false
precision = 2

[tool.coverage.html]
directory = "htmlcov"

# ===============================================================================
# DEVELOPMENT TOOLS
# ===============================================================================

[tool.djlint]
# Template linting for HTMX + Tailwind templates
profile = "django"
extension = "html"
indent = 2
max_line_length = 100
format_attribute_template_tags = true

[tool.djlint.rules]
# template standards
ignore = "H006,H030,H031"  # Allow img without alt, allow raw text, allow Meta tag

# ===============================================================================
# DEPLOYMENT CONFIGURATION
# ===============================================================================

[tool.setuptools.packages.find]
where = ["."]
include = ["apps*", "config*", "ui*"]
exclude = ["tests*", "*.tests*"]

[tool.setuptools.package-data]
"*" = ["*.html", "*.css", "*.js", "*.json", "*.txt", "*.md"]
