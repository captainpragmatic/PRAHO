# =============================================================================
# PRAHO Native Deployment Role
# =============================================================================
# Deploys PRAHO directly on the host with PostgreSQL + uv + systemd + Caddy.
# No Docker required.
#
# The .env file is the single source of truth for all configuration.
# Ansible reads it locally, copies it to the server, then uses its values.

# ---------------------------------------------------------------------------
# 0. Parse .env file for use throughout this role
# ---------------------------------------------------------------------------

- name: Read .env file locally for role variables
  shell: "grep -E '^[A-Z_]+=' {{ env_file_path }} | grep -v '^#'"
  delegate_to: localhost
  become: false
  register: role_env_contents
  changed_when: false

- name: Parse .env vars for role use
  set_fact:
    deployed_env: "{{ dict(role_env_contents.stdout_lines | map('split', '=', 1)) }}"

# ---------------------------------------------------------------------------
# 1. PostgreSQL 15
# ---------------------------------------------------------------------------

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download PostgreSQL GPG key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/postgresql.asc
    mode: "0644"

- name: Add PostgreSQL APT repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/postgresql.asc] http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present

- name: Install PostgreSQL 15
  apt:
    name:
      - postgresql-15
      - postgresql-client-15
      - libpq-dev
    state: present
    update_cache: yes

- name: Ensure PostgreSQL is started and enabled
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Install psycopg for Ansible PostgreSQL modules
  apt:
    name: python3-psycopg
    state: present

- name: Create PostgreSQL user
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ deployed_env.DB_USER | default('praho') }}"
    password: "{{ deployed_env.DB_PASSWORD }}"
    role_attr_flags: CREATEDB
    state: present

- name: Create PostgreSQL database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ deployed_env.DB_NAME | default('praho') }}"
    owner: "{{ deployed_env.DB_USER | default('praho') }}"
    encoding: UTF-8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    state: present

# ---------------------------------------------------------------------------
# 2. Python 3.13 + build dependencies
# ---------------------------------------------------------------------------

- name: Install prerequisites for deadsnakes PPA
  apt:
    name:
      - software-properties-common
      - acl
    state: present

- name: Add deadsnakes PPA
  apt_repository:
    repo: "ppa:deadsnakes/ppa"
    state: present

- name: Install Python {{ python_version }} and build dependencies
  apt:
    name:
      - "python{{ python_version }}"
      - "python{{ python_version }}-dev"
      - "python{{ python_version }}-venv"
      - build-essential
      - gettext
    state: present
    update_cache: yes

# ---------------------------------------------------------------------------
# 3. uv package manager
# ---------------------------------------------------------------------------

- name: Install uv
  shell: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
  args:
    creates: /usr/local/bin/uv

- name: Verify uv is available
  command: /usr/local/bin/uv --version
  changed_when: false

# ---------------------------------------------------------------------------
# 4. Code deployment
# ---------------------------------------------------------------------------

- name: Create source directory
  file:
    path: "{{ project_root }}/src"
    state: directory
    owner: "{{ project_user }}"
    group: "{{ project_group }}"
    mode: "0755"

- name: Create static, media, and log directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ project_user }}"
    group: "{{ project_group }}"
    mode: "0755"
  loop:
    - "{{ project_root }}/static"
    - "{{ project_root }}/portal-static"
    - "{{ project_root }}/media"
    - "{{ project_root }}/logs"
    - /var/log/praho
    - /var/log/praho/portal

- name: Deploy code via rsync
  synchronize:
    src: "{{ playbook_dir }}/../../../"
    dest: "{{ project_root }}/src/"
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.venv"
      - "--exclude=.venv-darwin"
      - "--exclude=.venv-linux"
      - "--exclude=__pycache__"
      - "--exclude=node_modules"
      - "--exclude=*.pyc"
      - "--exclude=.env"
      - "--exclude=.env.*"
      - "--exclude=.envrc"
      - "--exclude=db.sqlite3"
      - "--exclude=.mypy_cache"
      - "--exclude=.pytest_cache"
      - "--exclude=htmlcov"
      - "--exclude=.ruff_cache"
      - "--exclude=.vscode"
      - "--exclude=.idea"
  when: deploy_method == 'rsync'
  notify:
    - restart praho-platform
    - restart praho-portal
    - restart praho-qcluster

- name: Deploy code via git
  git:
    repo: "{{ praho_git_repo }}"
    dest: "{{ project_root }}/src"
    version: "{{ deploy_git_version }}"
    force: yes
  become_user: "{{ project_user }}"
  when: deploy_method == 'git'
  notify:
    - restart praho-platform
    - restart praho-portal
    - restart praho-qcluster

- name: Get deployed git SHA
  command: git rev-parse --short HEAD
  args:
    chdir: "{{ project_root }}/src"
  register: deployed_sha
  changed_when: false
  when: deploy_method == 'git'
  become_user: "{{ project_user }}"

- name: Set source ownership
  file:
    path: "{{ project_root }}/src"
    owner: "{{ project_user }}"
    group: "{{ project_group }}"
    recurse: yes

# ---------------------------------------------------------------------------
# 5. Virtual environment + dependencies
# ---------------------------------------------------------------------------

- name: Create virtualenv with uv
  command: >
    /usr/local/bin/uv venv
    --python python{{ python_version }}
    {{ project_root }}/.venv-linux
  args:
    creates: "{{ project_root }}/.venv-linux/bin/python"
  become_user: "{{ project_user }}"

- name: Install dependencies with uv
  command: >
    /usr/local/bin/uv sync
    --group platform
    --group prod
    --frozen
  args:
    chdir: "{{ project_root }}/src"
  become_user: "{{ project_user }}"
  environment:
    UV_PROJECT_ENVIRONMENT: "{{ project_root }}/.venv-linux"

# ---------------------------------------------------------------------------
# 6. Environment file (.env as single source of truth)
# ---------------------------------------------------------------------------

- name: Validate .env file exists locally
  stat:
    path: "{{ env_file_path }}"
  delegate_to: localhost
  become: false
  register: env_file_check

- name: Fail if .env file not found
  fail:
    msg: >
      Environment file not found at {{ env_file_path }}.
      Copy .env.example.{{ praho_env }} to .env.{{ praho_env }} and fill in values.
      See docs/deployment/DEPLOYMENT.md for details.
  when: not env_file_check.stat.exists

- name: Validate required variables in .env file
  shell: |
    missing=""
    while IFS='=' read -r key value; do
      # Skip comments and empty lines
      case "$key" in \#*|"") continue ;; esac
      # Trim whitespace
      key=$(echo "$key" | xargs)
      value=$(echo "$value" | xargs)
    done < "{{ env_file_path }}"
    # Check critical vars
    for var in DJANGO_SECRET_KEY DB_PASSWORD HMAC_SECRET PORTAL_DOMAIN PLATFORM_DOMAIN; do
      val=$(grep "^${var}=" "{{ env_file_path }}" | head -1 | cut -d'=' -f2-)
      if [ -z "$val" ]; then missing="$missing $var"; fi
    done
    if [ -n "$missing" ]; then
      echo "MISSING:$missing"
      exit 1
    fi
  delegate_to: localhost
  become: false
  register: env_validation
  changed_when: false

- name: Copy environment file to server
  copy:
    src: "{{ env_file_path }}"
    dest: "{{ project_root }}/.env"
    owner: "{{ project_user }}"
    group: "{{ project_group }}"
    mode: "0600"
  notify:
    - restart praho-platform
    - restart praho-portal
    - restart praho-qcluster

# deployed_env is already set from step 0 (parsed from local .env file)

# ---------------------------------------------------------------------------
# 7. Django setup
# ---------------------------------------------------------------------------

- name: Set Django environment variables from .env file
  set_fact:
    django_env:
      PYTHONPATH: "{{ project_root }}/src/services/platform"
      DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
      # Read all vars from the deployed .env file
      DB_NAME: "{{ deployed_env.DB_NAME | default('praho') }}"
      DB_USER: "{{ deployed_env.DB_USER | default('praho') }}"
      DB_PASSWORD: "{{ deployed_env.DB_PASSWORD }}"
      DB_HOST: "{{ deployed_env.DB_HOST | default('localhost') }}"
      DB_PORT: "{{ deployed_env.DB_PORT | default('5432') }}"
      DB_SSLMODE: "{{ deployed_env.DB_SSLMODE | default('disable') }}"
      DJANGO_SECRET_KEY: "{{ deployed_env.DJANGO_SECRET_KEY }}"
      HMAC_SECRET: "{{ deployed_env.HMAC_SECRET | default('') }}"
      PLATFORM_API_SECRET: "{{ deployed_env.PLATFORM_API_SECRET | default(deployed_env.HMAC_SECRET | default('')) }}"
      STATIC_ROOT: "{{ project_root }}/static"
      MEDIA_ROOT: "{{ project_root }}/media"
      ALLOWED_HOSTS: "{{ deployed_env.PORTAL_DOMAIN }},{{ deployed_env.PLATFORM_DOMAIN }},localhost,127.0.0.1"
      PORTAL_DOMAIN: "{{ deployed_env.PORTAL_DOMAIN }}"
      PLATFORM_DOMAIN: "{{ deployed_env.PLATFORM_DOMAIN }}"
      DJANGO_SECURE_SSL_REDIRECT: "{{ deployed_env.DJANGO_SECURE_SSL_REDIRECT | default('false') }}"

- name: Run database migrations
  command: >
    {{ project_root }}/.venv-linux/bin/python manage.py migrate --noinput
  args:
    chdir: "{{ project_root }}/src/services/platform"
  become_user: "{{ project_user }}"
  environment: "{{ django_env }}"

- name: Create database cache table
  command: >
    {{ project_root }}/.venv-linux/bin/python manage.py createcachetable
  args:
    chdir: "{{ project_root }}/src/services/platform"
  become_user: "{{ project_user }}"
  environment: "{{ django_env }}"
  failed_when: false

- name: Collect Platform static files
  command: >
    {{ project_root }}/.venv-linux/bin/python manage.py collectstatic --noinput
  args:
    chdir: "{{ project_root }}/src/services/platform"
  become_user: "{{ project_user }}"
  environment: "{{ django_env }}"

- name: Collect Portal static files
  command: >
    {{ project_root }}/.venv-linux/bin/python manage.py collectstatic --noinput
  args:
    chdir: "{{ project_root }}/src/services/portal"
  become_user: "{{ project_user }}"
  environment:
    PYTHONPATH: "{{ project_root }}/src/services/portal"
    DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
    DJANGO_SECRET_KEY: "{{ deployed_env.DJANGO_SECRET_KEY }}"
    ALLOWED_HOSTS: "{{ deployed_env.PORTAL_DOMAIN }},localhost,127.0.0.1"
    PORTAL_DOMAIN: "{{ deployed_env.PORTAL_DOMAIN }}"
    PLATFORM_API_BASE_URL: "http://localhost:{{ platform_port }}/api"
    PLATFORM_API_ALLOW_INSECURE_HTTP: "true"
    DJANGO_SECURE_SSL_REDIRECT: "false"
    PLATFORM_API_SECRET: "{{ deployed_env.PLATFORM_API_SECRET | default(deployed_env.HMAC_SECRET | default('')) }}"
    STATIC_ROOT: "{{ project_root }}/portal-static"

- name: Set up initial data (categories, settings, tasks, templates, superuser)
  command: >
    {{ project_root }}/.venv-linux/bin/python manage.py setup_initial_data
  args:
    chdir: "{{ project_root }}/src/services/platform"
  become_user: "{{ project_user }}"
  environment: "{{ django_env }}"

# ---------------------------------------------------------------------------
# 8. Caddy reverse proxy
# ---------------------------------------------------------------------------

- name: Install Caddy APT prerequisites
  apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
    state: present

- name: Add Caddy GPG key
  shell: curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Add Caddy APT repository
  shell: curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  args:
    creates: /etc/apt/sources.list.d/caddy-stable.list

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: yes

- name: Create Caddy log directory
  file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: "0755"

- name: Create Caddy log files with correct ownership
  file:
    path: "/var/log/caddy/{{ item }}"
    state: touch
    owner: caddy
    group: caddy
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  loop:
    - portal-access.log
    - platform-access.log

- name: Template Caddyfile
  template:
    src: Caddyfile.native.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --config %s --adapter caddyfile"
  notify: restart caddy

# ---------------------------------------------------------------------------
# 9. Systemd services
# ---------------------------------------------------------------------------

- name: Template praho-platform systemd unit
  template:
    src: praho-platform.service.j2
    dest: /etc/systemd/system/praho-platform.service
    mode: "0644"
  notify:
    - systemd daemon-reload
    - restart praho-platform

- name: Template praho-portal systemd unit
  template:
    src: praho-portal.service.j2
    dest: /etc/systemd/system/praho-portal.service
    mode: "0644"
  notify:
    - systemd daemon-reload
    - restart praho-portal

- name: Template praho-qcluster systemd unit
  template:
    src: praho-qcluster.service.j2
    dest: /etc/systemd/system/praho-qcluster.service
    mode: "0644"
  notify:
    - systemd daemon-reload
    - restart praho-qcluster

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and start PRAHO services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - praho-platform
    - praho-portal
    - praho-qcluster

- name: Enable and start Caddy
  systemd:
    name: caddy
    state: started
    enabled: yes

# ---------------------------------------------------------------------------
# 10. Backup and utility scripts
# ---------------------------------------------------------------------------

- name: Template backup script
  template:
    src: backup-native.sh.j2
    dest: "{{ project_root }}/scripts/backup.sh"
    owner: "{{ project_user }}"
    group: "{{ project_group }}"
    mode: "0755"
  when: backup_enabled

- name: Template restore script
  template:
    src: restore-native.sh.j2
    dest: "{{ project_root }}/scripts/restore.sh"
    owner: "{{ project_user }}"
    group: "{{ project_group }}"
    mode: "0755"

- name: Template health check script
  template:
    src: health-check.sh.j2
    dest: "{{ project_root }}/scripts/health-check.sh"
    owner: "{{ project_user }}"
    group: "{{ project_group }}"
    mode: "0755"

- name: Setup backup cron job
  cron:
    name: "PRAHO database backup"
    minute: "0"
    hour: "2"
    job: "{{ project_root }}/scripts/backup.sh >> {{ project_root }}/logs/backup.log 2>&1"
    user: "{{ project_user }}"
  when: backup_enabled

# ---------------------------------------------------------------------------
# 11. Health check
# ---------------------------------------------------------------------------

- name: Wait for platform to be healthy
  uri:
    url: "http://localhost:{{ platform_port }}/api/users/health/"
    status_code: 200
    follow_redirects: none
  register: platform_health
  until: platform_health.status == 200
  retries: 30
  delay: 5

- name: Wait for portal to respond
  uri:
    url: "http://localhost:{{ portal_port }}/"
    status_code:
      - 200
      - 301
      - 302
    follow_redirects: none
  register: portal_health
  until: portal_health.status in [200, 301, 302]
  retries: 15
  delay: 5

- name: Display deployment info
  debug:
    msg: |
      ================================================
      PRAHO Native Deployment Complete!
      ================================================
      Portal:    https://{{ deployed_env.PORTAL_DOMAIN }}
      Platform:  https://{{ deployed_env.PLATFORM_DOMAIN }}
      Local:     http://localhost:{{ platform_port }} / http://localhost:{{ portal_port }}
      Q-Cluster: running ({{ qcluster_workers }} workers)
      Database:  PostgreSQL 15 (localhost:{{ deployed_env.DB_PORT | default('5432') }})
      Method:    {{ deploy_method }}
      Version:   {{ deploy_git_version + ' (' + deployed_sha.stdout + ')' if deploy_method == 'git' else 'rsync (local)' }}
      Env file:  {{ env_file_path }}
      ================================================
      Useful commands:
        systemctl status praho-platform praho-portal praho-qcluster
        journalctl -u praho-platform -f
        {{ project_root }}/scripts/health-check.sh
        {{ project_root }}/scripts/backup.sh
      ================================================
