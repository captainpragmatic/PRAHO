# =============================================================================
# PRAHO - Ansible Global Variables
# =============================================================================
# Variables needed by Ansible itself (infrastructure, not Django config).
# Django configuration lives in .env.{prod,staging} — see .env.example.prod.

# Ansible remote Python — pin to system Python to avoid deadsnakes/venv conflicts
ansible_python_interpreter: /usr/bin/python3

# Project settings
project_name: praho
project_user: praho
project_group: praho
project_root: /opt/praho

# Path to the .env file for this deployment (relative to project root)
# Operator workflow: cp .env.example.prod .env.prod → make deploy-prod
env_file_path: "{{ playbook_dir }}/../../../.env.{{ praho_env | default('prod') }}"

# Auto-derive Django settings from praho_env
# Pass -e praho_env=staging|prod on the command line
# Note: "environment" is an Ansible reserved keyword — we use "praho_env" instead
django_settings_module: "config.settings.{{ praho_env | default('prod') }}"

# Ports (needed by Caddyfile template and health checks)
platform_port: 8700
portal_port: 8701

# Docker (only used by Docker deployment path)
docker_compose_version: "2.24.0"
praho_version: "{{ lookup('env', 'PRAHO_VERSION') | default('latest', true) }}"

# Backup settings
backup_enabled: true
backup_retention_days: 30
backup_directory: /opt/praho/backups

# Firewall
firewall_enabled: true
allowed_ports:
  - 22
  - 80
  - 443
