# =============================================================================
# PRAHO - Native Single Server Inventory (Unified)
# =============================================================================
# All-in-one server: Platform + Portal + DB + Caddy
# Works for ALL environments — pass -e praho_env=staging|prod
#
# Connection vars (PRAHO_SERVER_IP, PRAHO_SSH_USER, PRAHO_SSH_KEY) are read
# from the .env.{env} file. The Makefile sources the file before calling Ansible.
#
# Deploy:
#   make deploy-staging   # reads .env.staging
#   make deploy-prod      # reads .env.prod

all:
  hosts:
    praho-server:
      ansible_host: "{{ lookup('env', 'PRAHO_SERVER_IP') }}"
      ansible_user: "{{ lookup('env', 'PRAHO_SSH_USER') | default('root', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'PRAHO_SSH_KEY') | default('~/.ssh/id_ed25519', true) }}"

  children:
    praho:
      hosts:
        praho-server:
      vars:
        deploy_platform: true
        deploy_portal: true
        deploy_database: true
        deploy_caddy: true
