# =============================================================================
# PRAHO - Native Single Server Deployment Playbook
# =============================================================================
# Deploys PRAHO natively (PostgreSQL + uv + systemd + Caddy) - no Docker.
# Works for any environment — pass -e praho_env=staging|prod.
#
# Usage:
#   cp .env.example.prod .env.prod   # fill in values
#   make deploy-prod                  # or: make deploy-staging

---
- name: Deploy PRAHO - Native Single Server ({{ praho_env | default('prod') }})
  hosts: praho
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Validate praho_env
      assert:
        that:
          - praho_env is defined
          - praho_env in ['dev', 'staging', 'prod']
        fail_msg: "Set environment with: -e praho_env=staging|prod"

    - name: Validate Ubuntu version
      assert:
        that:
          - ansible_distribution == 'Ubuntu'
          - ansible_distribution_version is version('24.04', '>=')
        fail_msg: "Requires Ubuntu >= 24.04 LTS (found {{ ansible_distribution }} {{ ansible_distribution_version }})"

    - name: Validate .env file exists
      stat:
        path: "{{ env_file_path }}"
      delegate_to: localhost
      become: false
      register: preflight_env_check

    - name: Fail if .env file not found
      fail:
        msg: >
          Missing .env file at {{ env_file_path }}.
          Run: cp .env.example.{{ praho_env }} .env.{{ praho_env }}
          Then fill in the [REQUIRED] values and re-run.
      when: not preflight_env_check.stat.exists

    - name: Read env vars for pre-flight validation
      shell: "grep -E '^[A-Z_]+=' {{ env_file_path }} | grep -v '^#'"
      delegate_to: localhost
      become: false
      register: preflight_env_contents
      changed_when: false

    - name: Parse pre-flight env vars
      set_fact:
        preflight_env: "{{ dict(preflight_env_contents.stdout_lines | map('split', '=', 1)) }}"
      delegate_to: localhost
      become: false

    - name: Validate required env vars
      assert:
        that:
          - preflight_env.PORTAL_DOMAIN is defined and preflight_env.PORTAL_DOMAIN | length > 0
          - preflight_env.PLATFORM_DOMAIN is defined and preflight_env.PLATFORM_DOMAIN | length > 0
          - preflight_env.SECRET_KEY is defined and preflight_env.SECRET_KEY | length > 0
          - preflight_env.DB_PASSWORD is defined and preflight_env.DB_PASSWORD | length > 0
          - preflight_env.HMAC_SECRET is defined and preflight_env.HMAC_SECRET | length > 0
        fail_msg: >
          Missing required variables in {{ env_file_path }}.
          Ensure PORTAL_DOMAIN, PLATFORM_DOMAIN, SECRET_KEY, DB_PASSWORD, and HMAC_SECRET are set.

    # -------------------------------------------------------------------
    # DNS pre-flight: verify both FQDNs resolve to this server's IP
    # -------------------------------------------------------------------
    - name: Resolve portal_domain DNS
      command: "dig +short {{ preflight_env.PORTAL_DOMAIN }} A"
      register: portal_dns
      changed_when: false
      delegate_to: localhost
      become: false
      tags: [preflight, dns]

    - name: Resolve platform_domain DNS
      command: "dig +short {{ preflight_env.PLATFORM_DOMAIN }} A"
      register: platform_dns
      changed_when: false
      delegate_to: localhost
      become: false
      tags: [preflight, dns]

    - name: Verify portal_domain resolves to this server
      assert:
        that:
          - portal_dns.stdout | trim == ansible_host
        fail_msg: >
          DNS MISMATCH: {{ preflight_env.PORTAL_DOMAIN }} resolves to '{{ portal_dns.stdout | trim }}'
          but this server is '{{ ansible_host }}'.
          Update your DNS A record before deploying — Caddy ACME will fail without it.
      tags: [preflight, dns]

    - name: Verify platform_domain resolves to this server
      assert:
        that:
          - platform_dns.stdout | trim == ansible_host
        fail_msg: >
          DNS MISMATCH: {{ preflight_env.PLATFORM_DOMAIN }} resolves to '{{ platform_dns.stdout | trim }}'
          but this server is '{{ ansible_host }}'.
          Update your DNS A record before deploying — Caddy ACME will fail without it.
      tags: [preflight, dns]

  roles:
    - common
    - praho-native

  post_tasks:
    - name: Verify platform HTTP
      uri:
        url: "http://localhost:{{ platform_port }}/api/users/health/"
        status_code: 200
        follow_redirects: none
      register: post_platform_check
      retries: 3
      delay: 5
      until: post_platform_check.status == 200

    - name: Verify portal HTTP
      uri:
        url: "http://localhost:{{ portal_port }}/"
        status_code:
          - 200
          - 301
          - 302
        follow_redirects: none
      register: post_portal_check
      retries: 3
      delay: 5
      until: post_portal_check.status in [200, 301, 302]

    - name: Verify Portal HTTPS endpoint
      uri:
        url: "https://{{ deployed_env.PORTAL_DOMAIN }}/"
        status_code:
          - 200
          - 301
          - 302
        validate_certs: yes
        follow_redirects: none
      register: post_portal_https
      retries: 15
      delay: 10
      until: post_portal_https.status | default(0) in [200, 301, 302]
      tags: [post-verify]

    - name: Verify Platform HTTPS endpoint
      uri:
        url: "https://{{ deployed_env.PLATFORM_DOMAIN }}/api/users/health/"
        status_code: 200
        validate_certs: yes
        follow_redirects: none
      register: post_platform_https
      retries: 15
      delay: 10
      until: post_platform_https.status | default(0) == 200
      tags: [post-verify]

    - name: Report deployment status
      debug:
        msg: |
          ================================================
          PRAHO Deployment Verified! ({{ praho_env }})
          ================================================
          Environment: {{ praho_env }}
          Settings:    {{ django_settings_module }}
          Portal:      https://{{ deployed_env.PORTAL_DOMAIN }}
          Platform:    https://{{ deployed_env.PLATFORM_DOMAIN }}
          Env file:    {{ env_file_path }}
          ================================================
      tags: [post-verify]
