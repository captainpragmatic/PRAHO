# =============================================================================
# PRAHO - SINGLE SERVER DEPLOYMENT (All Services)
# =============================================================================
# Deploy Platform + Portal + PostgreSQL + Caddy on a single server
# Usage: docker-compose -f deploy/docker-compose.single-server.yml up -d
#
# Required environment variables in .env:
#   - DOMAIN (e.g., praho.example.com)
#   - DB_PASSWORD
#   - DJANGO_SECRET_KEY
#   - ACME_EMAIL (for Let's Encrypt)

services:
  # ===========================================================================
  # DATABASE - PostgreSQL
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: praho_db
    environment:
      POSTGRES_DB: praho
      POSTGRES_USER: praho
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praho -d praho"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - internal

  # ===========================================================================
  # PLATFORM SERVICE - Full Django Application
  # ===========================================================================
  platform:
    image: ${REGISTRY:-}praho-platform:${VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/platform/Dockerfile
    container_name: praho_platform
    environment:
      - DEBUG=0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=praho
      - DB_USER=praho
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY required}
      - HMAC_SECRET=${PLATFORM_API_SECRET:?PLATFORM_API_SECRET required}
      - PLATFORM_TO_PORTAL_WEBHOOK_SECRET=${PLATFORM_TO_PORTAL_WEBHOOK_SECRET:?PLATFORM_TO_PORTAL_WEBHOOK_SECRET required}
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - ALLOWED_HOSTS=${DOMAIN:-localhost},localhost,platform
      - CSRF_TRUSTED_ORIGINS=https://${DOMAIN:-localhost}
      - DJANGO_SECURE_SSL_REDIRECT=false
      - SERVICE_NAME=platform
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8700/api/users/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - internal
      - web

  # ===========================================================================
  # PORTAL SERVICE - Lightweight Customer API
  # ===========================================================================
  portal:
    image: ${REGISTRY:-}praho-portal:${VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/portal/Dockerfile
    container_name: praho_portal
    environment:
      - DEBUG=0
      - PLATFORM_API_BASE_URL=http://platform:8700/api
      - PLATFORM_API_SECRET=${PLATFORM_API_SECRET:?PLATFORM_API_SECRET required}
      - PLATFORM_API_ALLOW_INSECURE_HTTP=${PLATFORM_API_ALLOW_INSECURE_HTTP:-true}
      - PLATFORM_TO_PORTAL_WEBHOOK_SECRET=${PLATFORM_TO_PORTAL_WEBHOOK_SECRET:?PLATFORM_TO_PORTAL_WEBHOOK_SECRET required}
      - PORTAL_DOMAIN=${DOMAIN:-localhost}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY required}
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - ALLOWED_HOSTS=${DOMAIN:-localhost},localhost,portal
      - CSRF_TRUSTED_ORIGINS=https://${DOMAIN:-localhost}
      - DJANGO_SECURE_SSL_REDIRECT=false
      - SERVICE_NAME=portal
      - SESSION_DB_PATH=/app/data/portal.sqlite3
    volumes:
      - portal_static:/app/staticfiles
      - portal_logs:/app/logs
      - portal_sessions:/app/data
    depends_on:
      platform:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8701/status/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - web

  # ===========================================================================
  # CADDY - Reverse Proxy with Automatic HTTPS
  # ===========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: praho_caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_files:/srv/static:ro
      - media_files:/srv/media:ro
      - portal_static:/srv/portal-static:ro
    depends_on:
      - platform
      - portal
    restart: unless-stopped
    networks:
      - web

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  postgres_data:
  static_files:
  media_files:
  logs:
  portal_static:
  portal_logs:
  portal_sessions:
  caddy_data:
  caddy_config:
