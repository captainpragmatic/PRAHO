# ===============================================================================
# PLATFORM SERVICE CI/CD - FULL DJANGO WITH DATABASE
# ===============================================================================
# Tests and type checking for the platform service.
# Linting is consolidated in integration.yml (make lint).

name: Platform Service CI/CD

on:
  push:
    branches: [master, staging]
    paths:
      - 'services/platform/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/platform.yml'
  pull_request:
    branches: [master]
    paths:
      - 'services/platform/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/platform.yml'

env:
  DJANGO_SETTINGS_MODULE: config.settings.test
  DJANGO_SECRET_KEY: test-secret-key-for-ci
  UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/.venv-linux

jobs:
  platform-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install uv and sync dependencies
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python and install dependencies
      run: |
        uv python install
        uv sync --group platform --group dev

    - name: Run platform unit tests with coverage
      run: |
        cd services/platform
        PYTHONPATH=$(pwd) ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/coverage run manage.py test tests --verbosity=2
        ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/coverage xml -o coverage-platform.xml
        ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/coverage report --show-missing

    - name: Platform type checking (make check-types-platform)
      run: make check-types-platform

    - name: Upload platform artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: platform-reports
        path: |
          services/platform/htmlcov/
          services/platform/coverage-platform.xml
        if-no-files-found: warn

  platform-security:
    runs-on: ubuntu-latest
    needs: platform-test

    steps:
    - uses: actions/checkout@v4

    - name: Install uv and sync dependencies
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python and install dependencies
      run: |
        uv python install
        uv sync --group platform --group dev

    - name: Run Bandit SAST Security Scan
      run: |
        cd services/platform
        ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/bandit -r apps/ -ll -ii --exclude '*/tests/*,*/test_*' -f txt || echo "Bandit scan completed with findings"

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: services/platform/bandit-report.json
        if-no-files-found: warn
