# ===============================================================================
# PLATFORM SERVICE CI/CD - TIERED TESTING
# ===============================================================================
# PRs:                SQLite + affected-module detection (fast feedback)
# Master/staging:     PostgreSQL + full suite + coverage (production parity)
# workflow_dispatch:  PostgreSQL + full suite (manual trigger)
#
# Linting is consolidated in integration.yml (make lint).

name: Platform Service CI/CD

on:
  push:
    branches: [master, staging]
    paths:
      - 'services/platform/**'
      - 'shared/**'
      - 'scripts/affected_test_modules.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/platform.yml'
  pull_request:
    branches: [master, staging]
    paths:
      - 'services/platform/**'
      - 'shared/**'
      - 'scripts/affected_test_modules.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/platform.yml'
  workflow_dispatch:

env:
  DJANGO_SECRET_KEY: test-secret-key-for-ci
  UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/.venv-linux

jobs:
  # ---------------------------------------------------------------------------
  # PR Tests: SQLite + affected-module detection (fast feedback, ~30s)
  # ---------------------------------------------------------------------------
  pr-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv and sync dependencies
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python and install dependencies
      run: |
        uv python install
        uv sync --group platform --group dev

    - name: Detect affected test modules
      id: affected
      env:
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        git fetch origin "$PR_BASE_SHA" --depth=1 || true
        CHANGED=$(git diff --name-only "$PR_BASE_SHA"...HEAD)
        if [ -z "$CHANGED" ]; then
          echo "modules=FULL" >> "$GITHUB_OUTPUT"
          echo "No changed files detected — running full suite"
          exit 0
        fi
        MODULES=$(echo "$CHANGED" | "$UV_PROJECT_ENVIRONMENT/bin/python" scripts/affected_test_modules.py --verbose)
        echo "modules=$MODULES" >> "$GITHUB_OUTPUT"
        echo "Affected modules: $MODULES"

    - name: Run focused platform tests (SQLite)
      if: steps.affected.outputs.modules != 'FULL' && steps.affected.outputs.modules != ''
      env:
        MODULES: ${{ steps.affected.outputs.modules }}
      run: |
        cd services/platform
        PYTHONPATH=$(pwd) "$UV_PROJECT_ENVIRONMENT/bin/python" manage.py test $MODULES --settings=config.settings.test --verbosity=2 --failfast --parallel

    - name: Run full platform tests (SQLite)
      if: steps.affected.outputs.modules == 'FULL' || steps.affected.outputs.modules == ''
      run: |
        cd services/platform
        PYTHONPATH=$(pwd) "$UV_PROJECT_ENVIRONMENT/bin/python" manage.py test tests --settings=config.settings.test --verbosity=2 --failfast --parallel

    - name: Platform type checking
      run: make check-types-platform

  # ---------------------------------------------------------------------------
  # Master/Staging Tests: PostgreSQL + full suite + coverage (production parity)
  # ---------------------------------------------------------------------------
  master-test:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_INITDB_ARGS: "--nosync"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
          --shm-size=256mb
          --tmpfs /var/lib/postgresql/data
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.ci
      DB_NAME: postgres
      DB_USER: test
      DB_PASSWORD: test
      DB_HOST: localhost

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv and sync dependencies
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python and install dependencies
      run: |
        uv python install
        uv sync --group platform --group dev

    - name: Run full platform tests with coverage (PostgreSQL)
      run: |
        cd services/platform
        PYTHONPATH=$(pwd) "$UV_PROJECT_ENVIRONMENT/bin/coverage" run manage.py test tests --verbosity=2
        "$UV_PROJECT_ENVIRONMENT/bin/coverage" xml -o coverage-platform.xml
        "$UV_PROJECT_ENVIRONMENT/bin/coverage" report --show-missing

    - name: Platform type checking
      run: make check-types-platform

    - name: Upload platform artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: platform-reports
        path: |
          services/platform/htmlcov/
          services/platform/coverage-platform.xml
        if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Security scan (runs after whichever test job completed)
  # ---------------------------------------------------------------------------
  platform-security:
    runs-on: ubuntu-latest
    needs: [pr-test, master-test]
    if: always() && (needs.pr-test.result == 'success' || needs.master-test.result == 'success')

    steps:
    - uses: actions/checkout@v4

    - name: Install uv and sync dependencies
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python and install dependencies
      run: |
        uv python install
        uv sync --group platform --group dev

    - name: Run Bandit SAST Security Scan
      run: |
        cd services/platform
        "$UV_PROJECT_ENVIRONMENT/bin/bandit" -r apps/ -ll -ii --exclude '*/tests/*,*/test_*' -f txt || echo "Bandit scan completed with findings"

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: services/platform/bandit-report.json
        if-no-files-found: warn
