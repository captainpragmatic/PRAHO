# ===============================================================================
# INTEGRATION CI — Lint, Quality, Security, and Cross-Service Tests
# ===============================================================================
# Single source of truth for all linting (make lint) and cross-service validation.
# Service-specific tests and type checking live in platform.yml / portal.yml.

name: Integration CI

on:
  push:
    branches: [master, staging]
    paths:
      - 'services/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [master]
    paths:
      - 'services/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/integration.yml'

env:
  DJANGO_SETTINGS_MODULE: config.settings.test
  DJANGO_SECRET_KEY: test-secret-key-for-ci
  PLATFORM_API_URL: http://localhost:8000
  PLATFORM_API_KEY: test-integration-key
  UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/.venv-linux

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Quality — no database needed
  # ---------------------------------------------------------------------------
  lint-and-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history needed for ruff no-new-debt (Phase 0)

    - name: Install uv and sync dependencies
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python and install dependencies
      run: |
        uv python install
        uv sync --all-groups

    - name: Lint all services (make lint — 7 phases)
      run: make lint

    - name: Component parity check (portal ↔ platform)
      run: make check-parity
      continue-on-error: true  # TODO: fix badge.html drift, then make blocking

    - name: Template design-system lint
      run: make lint-templates
      continue-on-error: true  # TODO: fix 78 blockers, then make blocking

    - name: Install semgrep for security scanning
      run: |
        ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/pip install semgrep 2>/dev/null \
          || echo "⚠️ semgrep install failed — lint-security will skip semgrep checks"

    - name: Security lint (make lint-security)
      run: make lint-security
      continue-on-error: true  # Non-blocking until semgrep is a stable dependency

  # ---------------------------------------------------------------------------
  # Integration Tests — requires PostgreSQL
  # ---------------------------------------------------------------------------
  integration-test:
    runs-on: ubuntu-latest

    # Override workflow-level settings: integration tests need PostgreSQL + DatabaseCache
    env:
      DJANGO_SETTINGS_MODULE: config.settings.base
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv and sync dependencies
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python and install dependencies
      run: |
        uv python install
        uv sync --all-groups

    - name: Set up platform database
      run: |
        cd services/platform
        PYTHONPATH=$(pwd) ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/python manage.py migrate --no-input
        PYTHONPATH=$(pwd) ${{ env.UV_PROJECT_ENVIRONMENT }}/bin/python manage.py createcachetable

    - name: Service isolation security tests (make test-security)
      run: make test-security

    - name: Database cache tests (make test-cache)
      run: make test-cache

    - name: Integration test suite (make test-integration)
      run: make test-integration
