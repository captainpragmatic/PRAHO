{% load i18n %}
<aside class="col-span-12 lg:col-span-3">
  <div class="bg-slate-800 rounded-lg border border-slate-700 p-4 lg:sticky lg:top-4">
    <input type="search" name="q" placeholder="{% trans 'Search settings…' %}" autocomplete="off" class="w-full px-3 py-2 mb-4 bg-slate-900/60 border border-slate-600 rounded-lg text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500" hx-get="{% url 'settings:search' %}" hx-trigger="input changed delay:300ms" hx-target="#search-results" hx-swap="innerHTML">
    <div id="search-results"></div>
    <nav class="space-y-5">
      {% for zone in nav_zones %}
      <div>
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">{{ zone.label }}</p>
        <ul class="space-y-1">
          {% for group in zone.groups %}
          <li>
            <a href="{% url 'settings:group' group.slug %}" class="block px-3 py-1.5 rounded-md text-sm transition-colors {% if group.slug == active_group %}bg-blue-600/20 text-blue-300 font-medium{% else %}text-slate-300 hover:text-white hover:bg-slate-700/60{% endif %}">
              {{ group.label }}
            </a>
          </li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
      <div>
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">{% trans "System" %}</p>
        <ul class="space-y-1">
          <li><a href="{% url 'settings:automation' %}" class="block px-3 py-1.5 rounded-md text-sm text-slate-300 hover:text-white hover:bg-slate-700/60">{% trans "Automation & Schedules" %}</a></li>
          {% if is_admin %}
          <li><a href="{% url 'settings:export_settings' %}" class="block px-3 py-1.5 rounded-md text-sm text-slate-300 hover:text-white hover:bg-slate-700/60">{% trans "Export settings" %}</a></li>
          {% endif %}
        </ul>
      </div>
    </nav>
  </div>
</aside>
