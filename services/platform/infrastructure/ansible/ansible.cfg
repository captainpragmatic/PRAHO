# Ansible configuration for PRAHO Node Deployment
# Used for Virtualmin GPL installation and server configuration

[defaults]
inventory = inventory/
host_key_checking = True
retry_files_enabled = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600

# Performance optimizations
forks = 10
pipelining = True
strategy = free

# Output formatting
# The community.general.yaml stdout callback was REMOVED in community.general 12.0.0;
# its replacement is ansible-core's built-in default callback with result_format=yaml
# (ansible-core >= 2.13). timer/profile_tasks live in ansible.posix — reference them by
# FQCN via callbacks_enabled (the modern name for the deprecated callback_whitelist).
stdout_callback = default
result_format = yaml
callbacks_enabled = ansible.posix.timer, ansible.posix.profile_tasks

# SSH settings
timeout = 30
remote_user = root

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
