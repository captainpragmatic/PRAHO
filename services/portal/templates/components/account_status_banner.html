{# Persistent account status banner — non-dismissible, shown until condition resolves #}
{% load i18n %}

<div class="w-full {% if banner.severity == 'critical' %}bg-red-900/50 border-b border-red-500/50{% elif banner.severity == 'warning' %}bg-amber-900/50 border-b border-amber-500/50{% else %}bg-blue-900/50 border-b border-blue-500/50{% endif %}" role="alert">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      {# Icon + Message #}
      <div class="flex items-start min-w-0">
        <div class="flex-shrink-0 mr-3 mt-0.5">
          {% if banner.severity == "critical" %}
            <svg class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
            </svg>
          {% elif banner.severity == "warning" %}
            <svg class="h-5 w-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
            </svg>
          {% else %}
            <svg class="h-5 w-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>
            </svg>
          {% endif %}
        </div>
        <p class="text-sm font-medium {% if banner.severity == 'critical' %}text-red-200{% elif banner.severity == 'warning' %}text-amber-200{% else %}text-blue-200{% endif %}">
          {{ banner.message }}
        </p>
      </div>

      {# CTA Button #}
      <div class="flex-shrink-0 sm:ml-4">
        <a href="{{ banner.cta_url }}" class="inline-flex items-center px-3 py-1.5 text-sm font-medium rounded-md transition-colors {% if banner.severity == 'critical' %}bg-red-600 text-white hover:bg-red-500{% elif banner.severity == 'warning' %}bg-amber-600 text-white hover:bg-amber-500{% else %}bg-blue-600 text-white hover:bg-blue-500{% endif %} w-full sm:w-auto justify-center">
          {{ banner.cta_text }}
          <svg class="ml-1.5 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </a>
      </div>
    </div>
  </div>
</div>
