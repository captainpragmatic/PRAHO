{% load i18n %}
{% load ui_components %}

{# Stat metric tile for dashboards and detail pages. #}
<div class="bg-slate-800 rounded-lg border border-slate-700 p-4 h-full {{ css_class }}">
  <div class="flex items-start gap-3 h-full">
    {% if icon %}
    <div class="flex-shrink-0 h-10 w-10 rounded-lg flex items-center justify-center mt-0.5
      {% if variant == 'success' %}bg-green-900/50 text-green-400
      {% elif variant == 'warning' %}bg-yellow-900/50 text-yellow-400
      {% elif variant == 'danger' %}bg-red-900/50 text-red-400
      {% elif variant == 'primary' %}bg-blue-900/50 text-blue-400
      {% elif variant == 'info' %}bg-cyan-900/50 text-cyan-400
      {% else %}bg-slate-700/50 text-slate-400{% endif %}">
      {% icon icon size="md" css_class="text-current" %}
    </div>
    {% endif %}
    <div class="min-w-0 flex-1 min-h-[4rem]">
      <p class="text-xs font-medium text-slate-400 uppercase tracking-wide truncate">{{ label }}</p>
      <p class="mt-1 text-xl font-bold text-white truncate leading-tight">{{ value }}</p>
      {% if meta %}
      <p class="mt-1 text-xs text-slate-500 truncate">{{ meta }}</p>
      {% endif %}
    </div>
    {% if trend %}
    <div class="flex-shrink-0">
      <span class="text-xs font-medium
        {% if '+' in trend %}text-green-400
        {% elif '-' in trend %}text-red-400
        {% else %}text-slate-400{% endif %}">
        {{ trend }}
      </span>
    </div>
    {% endif %}
  </div>
</div>
